services:
  trustvc-webhook-events:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config.json:/app/config.json:ro
    env_file:
      - path: .env
        required: false
    environment:
      SIGNING_PRIVATE_KEY: ${SIGNING_PRIVATE_KEY:-}
      CONFIG_PATH: /app/config.json
      OTEL_EXPORTER_OTLP_ENDPOINT: http://trustvc-lgtm:4318
    restart: unless-stopped
    networks:
      - trustvc-otel

networks:
  trustvc-otel:
    external: true
    name: trustvc-otel
